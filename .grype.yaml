# Grype CVE scanning configuration.
# See: https://github.com/anchore/grype#configuration

# Only report vulnerabilities that have a fix available in the package ecosystem.
# This prevents Alpine OS package CVEs with no upstream patch yet from blocking
# CI and local scans. Once Alpine ships a fix, the vulnerability will automatically
# start appearing again.
only-fixed: true

ignore:
  # kube-router itself is reported as vulnerable to GHSA-phqm-jgc3-qf8g because
  # Grype reads the module version embedded in the binary (v2.x.x-dirty) and
  # matches it against the advisory. When building from HEAD we ARE the fix, so
  # this is a false positive that cannot be resolved by a dependency update.
  - vulnerability: GHSA-phqm-jgc3-qf8g
    package:
      name: github.com/cloudnativelabs/kube-router/v2
      type: go-module

  # CNI plugins are pulled as prebuilt binaries from upstream
  # https://github.com/containernetworking/plugins/releases (see CNI_VERSION in
  # the Makefile). We do not recompile these from source, so any CVEs in them
  # (stdlib or otherwise) can only be addressed by bumping CNI_VERSION to a
  # release that upstream has rebuilt with newer Go and updated dependencies.
  # The location glob keeps this rule scoped to /usr/libexec/cni/* so it does
  # NOT mask findings in any other Go binary in the image (kube-router, gobgp,
  # iptables-wrapper), which ARE rebuilt with our pinned BUILDTIME_BASE.
  - reason: "Upstream-prebuilt CNI plugins (containernetworking/plugins); CVEs tracked upstream, addressed by bumping CNI_VERSION"
    package:
      location: "/usr/libexec/cni/**"
